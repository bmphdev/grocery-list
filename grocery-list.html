<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marmiton Weekly Menu</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #b0bec5;
            --accent: #ff7e5f;
            --accent-hover: #feb47b;
            --category-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 700;
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
            background: -webkit-linear-gradient(var(--accent), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(255, 126, 95, 0.3);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 3rem;
            text-align: center;
            font-size: 1.15rem;
            font-weight: 400;
            max-width: 600px;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 750px;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 4rem;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .recipe-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 1rem;
            grid-template-columns: 1fr;
        }

        .recipe-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s ease-out forwards;
        }

        .recipe-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .recipe-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
        }

        .recipe-url {
            font-size: 0.95rem;
            color: var(--accent);
            text-decoration: none;
            word-break: break-all;
            transition: color 0.2s ease;
            position: relative;
            display: inline-flex;
            width: fit-content;
        }

        .recipe-url::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: var(--accent-hover);
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }

        .recipe-url:hover {
            color: var(--accent-hover);
        }

        .recipe-url:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        .recipe-category {
            display: inline-flex;
            align-items: center;
            background: var(--category-bg);
            padding: 0.35rem 0.85rem;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: var(--text-main);
            width: fit-content;
            margin-bottom: 0.25rem;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .error {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.25);
            color: #ff7675;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .empty-state {
            background: var(--card-bg);
            border: 1px dashed var(--card-border);
            padding: 3rem;
            border-radius: 16px;
            text-align: center;
            color: var(--text-muted);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <h1>Marmiton Savoury Recipes</h1>
    <p class="subtitle">A curated list of this week's menu items, excluding desserts and confiseries, beautifully
        presented.</p>

    <div class="container" id="app-container">
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-weight: 500;">Sourcing recipes...</p>
        </div>
        <ul class="recipe-list" id="recipe-list"></ul>
    </div>

    <script>
        let allRecipes = [];
        let allGlobalIngredients = {};

        document.addEventListener('DOMContentLoaded', () => {
            const endpoint = "https://www.marmiton.org/recettes/menu-de-la-semaine.aspx";
          //  const proxyUrl = "https://corsproxy.io/?url=" + encodeURIComponent(endpoint);
            const proxyUrl = "https://proxy.corsfix.com/?" + endpoint;

            fetch(proxyUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP Error: ${response.status}`);
                    }
                    return response.text();
                })
                .then(htmlString => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlString, "text/html");

                    const dailyMenus = doc.querySelectorAll(".daily-menu");
                    
                    for (let menu of dailyMenus) {
                        // Extract Day and Meal (e.g., "Lundi midi")
                        const titleEl = menu.querySelector(".page-title__title--type-intertitre");
                        const mealTime = titleEl ? titleEl.textContent.trim() : "";

                        const cards = menu.querySelectorAll(".card-vertical-detailed");

                        for (let card of cards) {
                            const labelEl = card.querySelector(".image-label");
                            const linkEl = card.querySelector("a.card-content__title");

                            if (labelEl && linkEl) {
                                const categoryRaw = labelEl.textContent.trim();
                                const category = categoryRaw.toLowerCase();

                                // Exclude specific categories
                                if (!category.includes("dessert") && !category.includes("confiserie")) {
                                    const title = linkEl.textContent.trim();
                                    let href = linkEl.getAttribute("href");

                                    if (href && href.startsWith("/")) {
                                        href = "https://www.marmiton.org" + href;
                                    } else if (href && !href.startsWith("http")) {
                                        href = "https://www.marmiton.org/" + href;
                                    }

                                    allRecipes.push({
                                        title: title || "Unknown Recipe",
                                        url: href,
                                        category: categoryRaw,
                                        mealTime: mealTime,
                                        ingredients: [],
                                        ignored: false
                                    });
                                }
                            }
                        }
                    }

                    if (allRecipes.length === 0) {
                        renderApp();
                        return;
                    }

                    // Fetch ingredients for all recipes
                    const loaderText = document.querySelector('#loader p');
                    if (loaderText) loaderText.textContent = "Fetching ingredients for " + allRecipes.length + " recipes...";

                    const fetchPromises = allRecipes.map(recipe => {
                      //  const recipeProxyUrl = "https://corsproxy.io/?url=" + encodeURIComponent(recipe.url);
                        const recipeProxyUrl = "https://proxy.corsfix.com/?" + recipe.url;
                        return fetch(recipeProxyUrl)
                            .then(res => res.ok ? res.text() : "")
                            .then(recipeHtml => {
                                if (!recipeHtml) return;
                                const recipeDoc = parser.parseFromString(recipeHtml, "text/html");
                                const ingredientCards = recipeDoc.querySelectorAll(".card-ingredient");
                                
                                ingredientCards.forEach(card => {
                                    const nameEl = card.querySelector(".ingredient-name");
                                    const countEl = card.querySelector(".count");
                                    const unitEl = card.querySelector(".unit");
                                    
                                    if (nameEl) {
                                        const name = nameEl.textContent.trim();
                                        const count = countEl ? countEl.textContent.trim() : "";
                                        const unit = unitEl ? unitEl.textContent.trim() : "";
                                        
                                        recipe.ingredients.push({
                                            name: name,
                                            count: count,
                                            unit: unit
                                        });
                                    }
                                });
                            })
                            .catch(err => console.error("Error fetching recipe:", recipe.url, err));
                    });

                    Promise.all(fetchPromises).then(() => {
                        renderApp();
                    });
                })
                .catch(error => {
                    console.error("Fetch/parsing failed:", error);
                    const loader = document.getElementById('loader');
                    loader.innerHTML = `
                        <div class="error">
                            <h3 style="margin-top:0; color: #ff5252;">Unable to load recipes</h3>
                            <p style="margin-bottom:0; opacity: 0.9;">${error.message}</p>
                        </div>
                    `;
                });
        });

        // Toggle Ignore State
        window.toggleIgnore = function(index) {
            allRecipes[index].ignored = !allRecipes[index].ignored;
            renderApp();
        };

        function renderApp() {
            const loader = document.getElementById('loader');
            const list = document.getElementById('recipe-list');
            const container = document.getElementById('app-container');

            loader.style.display = 'none';

            if (allRecipes.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <h3 style="color: var(--text-main); margin-top: 0;">No recipes found.</h3>
                        <p style="margin-bottom: 0;">It looks like there are no savoury recipes this week or the page structure changed.</p>
                    </div>
                `;
                return;
            }

            // Clean up existing UI to re-render
            const existingShoppingList = document.getElementById('shopping-list-section');
            if (existingShoppingList) existingShoppingList.remove();
            list.innerHTML = '';

            // Aggregate mapped ingredients (only for non-ignored recipes)
            allGlobalIngredients = {};
            allRecipes.forEach(recipe => {
                if (recipe.ignored) return;
                
                recipe.ingredients.forEach(ing => {
                    const key = ing.name.toLowerCase();
                    if (!allGlobalIngredients[key]) {
                        allGlobalIngredients[key] = {
                            name: ing.name,
                            quantities: []
                        };
                    }
                    
                    let qtyString = ing.count;
                    if (ing.unit) qtyString += " " + ing.unit;
                    qtyString = qtyString.trim();
                    
                    if (qtyString && !allGlobalIngredients[key].quantities.includes(qtyString)) {
                        allGlobalIngredients[key].quantities.push(qtyString);
                    }
                });
            });

            // --- Render Shopping List Section ---
            const shoppingListSection = document.createElement('div');
            shoppingListSection.className = 'recipe-item';
            shoppingListSection.style.marginBottom = '2rem';
            shoppingListSection.style.border = '1px solid var(--accent)';
            shoppingListSection.style.background = 'rgba(255, 126, 95, 0.05)';
            shoppingListSection.style.animation = 'none'; // Prevent re-animating on toggle
            shoppingListSection.style.opacity = '1';
            shoppingListSection.style.transform = 'translateY(0)';
            shoppingListSection.id = 'shopping-list-section';
            
            let shoppingHTML = `
                <h2 style="color: var(--accent); margin-top: 0; margin-bottom: 1rem; text-align: center;">🛒 Consolidated Shopping List</h2>
                
                <div style="background: rgba(0,0,0,0.15); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.05);">
                    <div style="display: flex; gap: 0.5rem; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <input type="password" id="gemini-api-key" placeholder="Enter Gemini API Key" style="flex: 1; padding: 0.5rem 0.8rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; outline: none; transition: border 0.2s;" />
                        <label style="display: flex; align-items: center; gap: 0.3rem; font-size: 0.85rem; cursor: pointer; color: var(--text-muted);">
                            <input type="checkbox" id="gemini-save-key" /> Save Key
                        </label>
                    </div>
                    <button id="gemini-generate-btn" style="width: 100%; padding: 0.6rem; border: none; border-radius: 6px; background: -webkit-linear-gradient(var(--accent), var(--accent-hover)); color: white; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s;">✨ Categorize with Gemini ✨</button>
                    <div id="gemini-status" style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--accent); text-align: center; display: none;">Generating list... This may take a moment.</div>
                </div>

                <div id="shopping-list-content">
                    <ul style="list-style-type: none; padding-left: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem;">
            `;

            const sortedIngredientKeys = Object.keys(allGlobalIngredients).sort();
            
            sortedIngredientKeys.forEach(key => {
                const item = allGlobalIngredients[key];
                const qtys = item.quantities.length > 0 ? ` <span style="color: var(--text-muted); font-size: 0.85rem;">(${item.quantities.join(" + ")})</span>` : "";
                shoppingHTML += `<li style="padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);"><strong>${item.name}</strong>${qtys}</li>`;
            });

            if (sortedIngredientKeys.length === 0) {
               shoppingHTML += `<li style="color: var(--text-muted); grid-column: 1 / -1; text-align: center;">No ingredients needed! All recipes are ignored.</li>`;
            }

            shoppingHTML += `</ul></div>`;
            shoppingListSection.innerHTML = shoppingHTML;
            container.insertBefore(shoppingListSection, list);

            // Handle Gemini Integration
            const apiKeyInput = document.getElementById('gemini-api-key');
            const saveKeyCheckbox = document.getElementById('gemini-save-key');
            const generateBtn = document.getElementById('gemini-generate-btn');
            const statusDiv = document.getElementById('gemini-status');
            const contentDiv = document.getElementById('shopping-list-content');
            
            const savedKey = localStorage.getItem('marmiton_gemini_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
                saveKeyCheckbox.checked = true;
            }

            generateBtn.addEventListener('click', async () => {
                const apiKey = apiKeyInput.value.trim();
                
                if (!apiKey) {
                    alert('Please enter a Gemini API Key');
                    return;
                }

                if (saveKeyCheckbox.checked) {
                    localStorage.setItem('marmiton_gemini_key', apiKey);
                } else {
                    localStorage.removeItem('marmiton_gemini_key');
                }

                // Prepare Prompt
                const ingredientsText = sortedIngredientKeys.map(key => {
                    const item = allGlobalIngredients[key];
                    const qtys = item.quantities.length > 0 ? `(${item.quantities.join(" + ")})` : "";
                    return `- ${item.name} ${qtys}`;
                }).join('\n');

                if (!ingredientsText) {
                     alert('No ingredients to categorize!');
                     return;
                }

                const prompt = `Take the following list of ingredients and quantities and categorize them logically for a supermarket shopping trip (e.g., Produce, Dairy & Eggs, Meat & Seafood, Pantry, Spices, Bakery, etc.). 
Format the output strictly as clean HTML that can be injected into a page. 
Use a <div> container. For each category, use an <h3> tag with inline styles (e.g., <h3 style="color: var(--accent); margin-bottom: 0.5rem;">). 
Under each category, use an <ul> with <li> tags for the ingredients. Use <strong> for the ingredient name and keep the quantities nicely formatted. 
Do not wrap the text in markdown code blocks like \`\`\`html. Output raw HTML only.

Ingredients:
${ingredientsText}`;

                // Call API
                generateBtn.disabled = true;
                generateBtn.style.opacity = '0.5';
                statusDiv.style.display = 'block';

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: prompt }]
                            }]
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error?.message || `HTTP Error ${response.status}`);
                    }

                    const data = await response.json();
                    let generatedHtml = data.candidates?.[0]?.content?.parts?.[0]?.text;

                    if (generatedHtml) {
                        // Clean up markdown markers if Gemini ignores the instruction
                        generatedHtml = generatedHtml.replace(/^```html\s*\n?/, '').replace(/\n?```$/, '');
                        contentDiv.innerHTML = generatedHtml;
                    } else {
                        throw new Error("No content generated in the response");
                    }
                } catch (error) {
                    statusDiv.innerHTML = `<span style="color: #ff5252;">Error: ${error.message}</span>`;
                } finally {
                    generateBtn.disabled = false;
                    generateBtn.style.opacity = '1';
                    if (!statusDiv.innerHTML.includes('Error')) {
                        statusDiv.style.display = 'none';
                    }
                }
            });

            // --- Render Recipes ---
            allRecipes.forEach((recipe, index) => {
                const li = document.createElement('li');
                li.className = 'recipe-item';
                li.style.animation = 'none'; // Avoid re-animating every toggle
                li.style.opacity = recipe.ignored ? '0.5' : '1';
                li.style.transform = 'translateY(0)';
                
                if (recipe.ignored) {
                    li.style.filter = 'grayscale(0.8)';
                }

                let ingredientsHTML = "";
                if (recipe.ingredients && recipe.ingredients.length > 0) {
                    const ingList = recipe.ingredients.map(ing => {
                        let text = ing.name;
                        let qty = [ing.count, ing.unit].filter(Boolean).join(" ").trim();
                        if (qty) text = `${text} <span style="color: var(--text-muted); font-size: 0.8em;">(${qty})</span>`;
                        return text;
                    }).join(', ');
                    
                    ingredientsHTML = `<div style="margin-top: 0.5rem; font-size: 0.9rem; line-height: 1.5; color: rgba(255,255,255,0.8); ${recipe.ignored ? 'text-decoration: line-through;' : ''}"><strong>Ingredients:</strong> ${ingList}</div>`;
                }

                const mealBadgeHTML = recipe.mealTime ? `<span style="display: inline-flex; align-items: center; background: rgba(0, 0, 0, 0.2); padding: 0.35rem 0.85rem; border-radius: 20px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; color: var(--accent-hover); margin-bottom: 0.25rem; border: 1px solid rgba(255,255,255,0.05); margin-left: 0.5rem;">🕒 ${recipe.mealTime}</span>` : '';
                const btnText = recipe.ignored ? 'Include Recipe' : 'Ignore Recipe';
                const btnStyle = recipe.ignored 
                    ? 'background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white;' 
                    : 'background: rgba(255, 82, 82, 0.1); border: 1px solid rgba(255, 82, 82, 0.3); color: #ff7675;';

                li.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;">
                        <div>
                            <span class="recipe-category" style="${recipe.ignored ? 'background: rgba(255,255,255,0.05); color: #888;' : ''}">${recipe.category}</span>
                            ${mealBadgeHTML}
                            <h3 class="recipe-title" style="margin-top: 0.5rem; ${recipe.ignored ? 'text-decoration: line-through; color: #888;' : ''}">
                                <a href="${recipe.url}" target="_blank" style="color: inherit; text-decoration: none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${recipe.title}</a>
                            </h3>
                            ${ingredientsHTML}
                        </div>
                        <button onclick="toggleIgnore(${index})" style="padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; ${btnStyle}">
                            ${btnText}
                        </button>
                    </div>
                `;
                
                list.appendChild(li);
            });
        }
    </script>
</body>

</html>
